<!-- chatbot_component.html - Complete working version -->
<div class="chatbot-container" id="chatbotContainer">
    <div class="chatbot-header" onclick="toggleChatbot()">
        <h3><i class="fas fa-robot"></i> AI Mental Health Assistant</h3>
        <span class="toggle-icon">▼</span>
    </div>
    
    <div class="chatbot-body" id="chatbotBody">
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="message-content">
                    Hello! I'm your AI mental health assistant. How are you feeling today?
                </div>
            </div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" 
                   id="chatInput" 
                   placeholder="Type your message here..." 
                   onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()" class="send-btn">
                <i class="fas fa-paper-plane"></i> Send
            </button>
        </div>
        
        <div class="crisis-warning" id="crisisWarning" style="display: none;">
            <p><strong>If you're in crisis:</strong> Please call 988 or text HOME to 741741 for immediate support.</p>
        </div>
    </div>
</div>

<style>
.chatbot-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 350px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.2);
    z-index: 1000;
}

.chatbot-header {
    background: #4a5568;
    color: white;
    padding: 12px 15px;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chatbot-header h3 {
    margin: 0;
    font-size: 16px;
}

.chatbot-body {
    height: 450px;
    display: flex;
    flex-direction: column;
    background: #f7fafc;
    border-radius: 0 0 10px 10px;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.message {
    margin-bottom: 12px;
    display: flex;
}

.message.user-message {
    justify-content: flex-end;
}

.message-content {
    max-width: 80%;
    padding: 10px 15px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.4;
    word-wrap: break-word;
}

.bot-message .message-content {
    background: #e2e8f0;
    color: #2d3748;
    border-bottom-left-radius: 4px;
}

.user-message .message-content {
    background: #4a5568;
    color: white;
    border-bottom-right-radius: 4px;
}

.chat-input-area {
    padding: 15px;
    background: white;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 10px;
}

.chat-input-area input {
    flex: 1;
    padding: 10px;
    border: 1px solid #cbd5e0;
    border-radius: 20px;
    outline: none;
    font-size: 14px;
}

.chat-input-area input:focus {
    border-color: #4a5568;
}

.send-btn {
    padding: 8px 16px;
    border: none;
    background: #4a5568;
    color: white;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
}

.send-btn:hover {
    background: #2d3748;
}

.crisis-warning {
    background: #fed7d7;
    padding: 10px;
    text-align: center;
    font-size: 12px;
    border-top: 1px solid #feb2b2;
}

.crisis-warning p {
    margin: 0;
    color: #c53030;
}

.typing-indicator .message-content {
    padding: 10px 15px;
    min-width: 50px;
}
</style>

<script>
let isChatbotOpen = true;

function toggleChatbot() {
    const body = document.getElementById('chatbotBody');
    const icon = document.querySelector('.toggle-icon');
    
    if (isChatbotOpen) {
        body.style.display = 'none';
        if (icon) icon.textContent = '▲';
    } else {
        body.style.display = 'flex';
        if (icon) icon.textContent = '▼';
    }
    isChatbotOpen = !isChatbotOpen;
}

function addMessage(text, sender) {
    const messagesDiv = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${sender}-message`;
    messageDiv.innerHTML = `<div class="message-content">${text}</div>`;
    messagesDiv.appendChild(messageDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function showTypingIndicator() {
    const messagesDiv = document.getElementById('chatMessages');
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message bot-message typing-indicator';
    typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = '<div class="message-content">...</div>';
    messagesDiv.appendChild(typingDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function removeTypingIndicator() {
    const typingIndicator = document.getElementById('typingIndicator');
    if (typingIndicator) {
        typingIndicator.remove();
    }
}

function sendMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    
    if (!message) return;
    
    addMessage(message, 'user');
    input.value = '';
    input.disabled = true;
    
    showTypingIndicator();
    
    fetch('/api/chat', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ message: message })
    })
    .then(response => response.json())
    .then(data => {
        removeTypingIndicator();
        if (data.success) {
            addMessage(data.response, 'bot');
            if (data.crisis_detected) {
                document.getElementById('crisisWarning').style.display = 'block';
            }
        } else {
            addMessage("I'm here to help. Can you tell me more about how you're feeling?", 'bot');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        removeTypingIndicator();
        addMessage("I'm here to listen. How are you feeling today?", 'bot');
    })
    .finally(() => {
        input.disabled = false;
        input.focus();
    });
}
</script>
