<div class="chatbot-container" id="chatbotContainer">
    <div class="chatbot-header" onclick="toggleChatbot()">
        <h3>🤖 AI Mental Health Assistant</h3>
        <span class="toggle-icon">▼</span>
    </div>
    
    <div class="chatbot-body" id="chatbotBody">
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="message-content">
                    Hello! I'm your AI mental health assistant. How are you feeling today?
                </div>
            </div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" 
                   id="chatInput" 
                   placeholder="Type your message here..." 
                   onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" class="send-btn">
                ➤
            </button>
        </div>
        
        <div class="crisis-warning" id="crisisWarning" style="display: none;">
            <p><strong>If you're in crisis:</strong> Please contact local emergency support immediately.</p>
        </div>
    </div>
</div>

<style>
.chatbot-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 350px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 25px rgba(0,0,0,0.1);
    z-index: 1000;
}

.chatbot-header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    padding: 15px;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
}

.chatbot-body {
    height: 400px;
    display: flex;
    flex-direction: column;
    background: #f8f9fa;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.message {
    margin-bottom: 10px;
    display: flex;
}

.user-message { justify-content: flex-end; }

.message-content {
    padding: 10px 15px;
    border-radius: 15px;
    max-width: 80%;
}

.bot-message .message-content {
    background: white;
}

.user-message .message-content {
    background: #667eea;
    color: white;
}

.chat-input-area {
    padding: 10px;
    display: flex;
    gap: 10px;
    background: white;
}

.chat-input-area input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ddd;
}

.send-btn {
    background: #667eea;
    color: white;
    border: none;
    width: 40px;
    border-radius: 50%;
    cursor: pointer;
}

.crisis-warning {
    background: #fee;
    padding: 10px;
    text-align: center;
    font-size: 12px;
    border-top: 1px solid #fcc;
}
</style>

<script>
let isChatbotOpen = true;

function toggleChatbot() {
    const body = document.getElementById('chatbotBody');
    const icon = document.querySelector('.toggle-icon');

    if (isChatbotOpen) {
        body.style.display = 'none';
        icon.textContent = '▲';
    } else {
        body.style.display = 'flex';
        icon.textContent = '▼';
    }
    isChatbotOpen = !isChatbotOpen;
}

function handleKeyPress(event) {
    if (event.key === 'Enter') sendMessage();
}

function addMessage(text, sender) {
    const messagesDiv = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${sender}-message`;
    messageDiv.innerHTML = `<div class="message-content">${text}</div>`;
    messagesDiv.appendChild(messageDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function showTypingIndicator() {
    const div = document.createElement('div');
    div.className = 'message bot-message';
    div.id = 'typingIndicator';
    div.innerHTML = `<div class="message-content">Typing...</div>`;
    document.getElementById('chatMessages').appendChild(div);
}

function removeTypingIndicator() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
}

function sendMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, 'user');
    input.value = '';
    showTypingIndicator();

    fetch('/api/chat', {
        method: 'POST',
        credentials: "include",   // ⭐ FIXES 401 ERROR
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: message })
    })
    .then(res => res.json())
    .then(data => {
        removeTypingIndicator();

        if (data.success) {
            addMessage(data.response, 'bot');

            if (data.crisis_detected) {
                document.getElementById('crisisWarning').style.display = 'block';
            }
        } else {
            addMessage("AI error occurred.", "bot");
        }
    })
    .catch(() => {
        removeTypingIndicator();
        addMessage("Server error. Try again.", "bot");
    });
}
</script>
