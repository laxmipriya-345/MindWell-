{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>New Journal Entry</h2>
    
    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>
                        <div class="mb-3">
                            <label for="content" class="form-label">Content</label>
                            <textarea class="form-control" id="content" name="content" rows="10" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Save Entry</button>
                        <a href="{{ url_for('journal') }}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">
                    <h5>Writing Prompts</h5>
                </div>
                <div class="card-body">
                    <ul class="list-unstyled">
                        <li class="mb-2">• What am I grateful for today?</li>
                        <li class="mb-2">• How am I feeling right now?</li>
                        <li class="mb-2">• What challenged me today?</li>
                        <li class="mb-2">• What went well today?</li>
                        <li class="mb-2">• What self-care did I practice?</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
